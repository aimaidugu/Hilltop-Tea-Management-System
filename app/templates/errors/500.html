{% extends "base.html" %}

{% block title %}Server Error - Hilltop Tea{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="error-page">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>500</h1>
            <h2>Server Error</h2>
            <p class="text-muted">Something went wrong on our end. Please try again later.</p>
            <a href="{{ url_for('production.dashboard') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
